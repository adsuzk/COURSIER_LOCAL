<!DOCTYPE html>
<html>
<head>
    <title>Test Modal Simple</title>
    <style>
        /* Styles du modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 999999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }
        
        .modal-content {
            background-color: #fff;
            margin: 2% auto;
            border-radius: 8px;
            width: 95%;
            height: 95%;
            max-width: 1200px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .modal-header {
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .close {
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }
        
        .close:hover {
            opacity: 0.7;
        }
        
        iframe {
            width: 100%;
            height: calc(100% - 60px);
            border: none;
            background: #fff;
        }
    </style>
</head>
<body>
    <h1>🧪 Test Modal CinetPay Simple</h1>
    
    <button onclick="testModal()">Tester Modal avec URL CinetPay</button>
    <button onclick="testModalGoogle()">Tester Modal avec Google</button>
    <button onclick="checkFunctions()">Vérifier Fonctions</button>
    
    <div id="results"></div>
    
    <!-- Modal HTML -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>💳 Paiement CinetPay</h3>
                <span class="close" onclick="closePaymentModal()">&times;</span>
            </div>
            <iframe id="paymentIframe" src="" frameborder="0"></iframe>
        </div>
    </div>
    
    <script>
        function log(message) {
            const div = document.getElementById('results');
            div.innerHTML += `<div>${message}</div>`;
            console.log(message);
        }
        
        // Définir showPaymentModal exactement comme dans modals.php
        window.showPaymentModal = function(url) {
            log('🎯 showPaymentModal appelée avec URL: ' + url);
            const modal = document.getElementById('paymentModal');
            const iframe = document.getElementById('paymentIframe');
            
            if (modal && iframe) {
                iframe.src = url;
                modal.style.display = 'block';
                document.body.style.overflow = 'hidden';
                log('✅ Modal ouvert avec succès');
            } else {
                log('❌ Éléments modal non trouvés: modal=' + !!modal + ', iframe=' + !!iframe);
            }
        };
        
        window.closePaymentModal = function() {
            const modal = document.getElementById('paymentModal');
            const iframe = document.getElementById('paymentIframe');
            
            if (modal) {
                modal.style.display = 'none';
                if (iframe) iframe.src = '';
                document.body.style.overflow = 'auto';
                log('✅ Modal fermé');
            }
        };
        
        function testModal() {
            log('=== TEST MODAL AVEC CINETPAY ===');
            window.showPaymentModal('https://checkout.cinetpay.com/payment/705f717b707c627f5465633e3ee657989f516f7a29a3f93acdcce9f66bb6c0306f5727261e9d8743d4bd12157c4b8397c0a1e097e0d703');
        }
        
        function testModalGoogle() {
            log('=== TEST MODAL AVEC GOOGLE ===');
            window.showPaymentModal('https://www.google.com');
        }
        
        function checkFunctions() {
            log('=== VÉRIFICATION FONCTIONS ===');
            log('typeof window.showPaymentModal: ' + typeof window.showPaymentModal);
            log('typeof window.closePaymentModal: ' + typeof window.closePaymentModal);
        }
        
        // Test automatique au chargement
        document.addEventListener('DOMContentLoaded', function() {
            log('📋 Page chargée');
            checkFunctions();
        });
    </script>
</body>
</html>
